{{ define "title" }}{{ .Title }}{{ end }} {{ define "head" }}
<meta name="description" content="{{ .Group }} — {{ .Tagline }}" />
{{ end }} {{ define "content" }}
<section class="hero">
  <img
    class="hero__emblem"
    src="/static/img/logo.png"
    alt="Emblema de Kuntur: cóndor andino en estilo geométrico"
  />
  <p class="hero__eyebrow">Música andina · Norte de Chile</p>
  <h1 class="hero__title">{{ .Group }}</h1>
  <p class="hero__tagline">{{ .Tagline }}</p>
  <a class="hero__cta" href="/presentaciones">Ver presentaciones</a>
</section>
{{ end }} {{ template "layout" . }}
